version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: postgres-laravel
    restart: always
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: laravel_db
      POSTGRES_USER: laravel_user
      POSTGRES_PASSWORD: laravel_pass
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
